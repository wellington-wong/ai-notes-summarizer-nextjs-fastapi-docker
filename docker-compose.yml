version: '3.9'
services:


    frontend:
      image: node:20
      working_dir: /app
      volumes:
        - ./frontend:/app
      command: sh -c "npm install && npm run dev"
      ports:
        - 3000:3000
      depends_on:
        - backend

    backend:
      image: python:3.11
      working_dir: /app
      volumes:
        - ./backend:/app
      command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --reload"
      ports:
        - 8000:8000
      environment:
        DATABASE_URL: postgresql://postgres:postgres@db:5432/notesdb
        OPENAI_API_KEY: ${OPENAI_API_KEY}
      depends_on:
        - db

    db:
      image: postgres:16
      restart: unless-stopped
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: notesdb
      volumes:
        - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: