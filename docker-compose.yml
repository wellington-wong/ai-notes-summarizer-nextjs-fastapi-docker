version: '3.9'

services:

    frontend:
      build: ./frontend
      ports:
        - 3000:3000
      depends_on:
        - backend

    backend:
      build: ./backend
      ports:
        - 8000:8000
      environment:
        DATABASE_URL: postgresql://postgres:postgres@db:5432/notesdb
        OPENAI_API_KEY: ${OPENAI_API_KEY}
      depends_on:
        - db

    db:
      image: postgres:16
      restart: unless-stopped
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: notesdb
      volumes:
        - postgres_data:/var/lib/postgresql/data

      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
        interval: 5s
        timeout: 5s
        retries: 5

volumes:
  postgres_data: