version: '3.9'

services:

    backend:
      build: ./backend
      restart: unless-stopped
      expose:
        - 8000
      environment:
        DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/notesdb
        OPENAI_API_KEY: ${OPENAI_API_KEY}
      depends_on:
        db:
          condition: service_healthy

    db:
      image: postgres:16
      restart: unless-stopped
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: notesdb
      volumes:
        - postgres_data:/var/lib/postgresql/data

      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
        interval: 5s
        timeout: 5s
        retries: 5

volumes:
  postgres_data: